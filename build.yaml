targets:
  $default:
    builders:
      # Disable drift's default builder — use modular generation instead
      drift_dev:
        enabled: false

      # Drift modular code generation (splits monolithic .g.dart into per-file .drift.dart)
      drift_dev:analyzer:
        enabled: true
        options: &drift_options
          store_date_time_values_as_text: true
          named_parameters: true
          generate_connect_constructor: false
      drift_dev:modular:
        enabled: true
        options: *drift_options
